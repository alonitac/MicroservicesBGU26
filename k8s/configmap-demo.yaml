apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  # "file-like" key - the "|" in YAML allows multi-line values
  prometheus.yml: |
    global:
      scrape_interval: 15s

    scrape_configs:
      - job_name: 'yolo-service'
        static_configs:
          - targets: ['yolo-svc:8080']
